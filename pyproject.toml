[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["frontend", "node_modules", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = "frontend|node_modules|\\.venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
