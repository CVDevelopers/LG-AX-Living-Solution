# PR gate (§12.2) — any failure blocks merge.
# M1 added the CVD-contrast accessibility assertion; M2 adds the sensor/degradation/eval/report
# tests to pytest (the heavy eval-500 stays on the nightly schedule, nightly.yml, §12.3).
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff + black)
        run: |
          ruff check .
          black --check .
      - name: Unit & contract tests (§8.3)
        run: pytest
      - name: Determinism gate — seed-42 rebuild matches committed demo DB (§12.2)
        run: python -m simulator.generate --seed 42 --sessions 60 --out /tmp/ci-demo.db --verify data/demo.db
      - name: quick-100 metric regression — time MAE ≤ baseline ×1.10 (§12.2)
        run: python -m eval.quick100 --check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (eslint + prettier)
        run: |
          npm run lint
          npm run format
      - name: Accessibility — CVD contrast on the heatmap ramp (§7.3, §12.2)
        run: npm test
      - name: Build
        run: npm run build
